<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascendra</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="container">

        <!--Start of Logbox-->
        <div class="logBox">

            <h1>Sign in</h1>

            <form id="loginForm">

                <label for="userName">
                    Email Address
                </label>

                <input 
                    type="email"
                    id="userName"
                    name="userName"
                    placeholder="Enter your email"
                    required>

                <label for="password">
                    Password
                </label>

                <input 
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required>

                <input 
                    type="submit"
                    value="Sign In">

            </form>

        </div>


        <!--Start of Welcomebox-->
        <div class="welcomeBox">

            <h1>
                Ascendra
            </h1>

            <h2>
                Sales Performance Platform
            </h2>

            <p>
                The difference between ordinary and exceptional is the commitment to keep improving.
            </p>

        </div>

    </div>

    <script src="config.js"></script>
    <script src="login.js"></script>

</body>

</html>
