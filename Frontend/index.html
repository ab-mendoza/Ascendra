<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascendra</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="login.css">
</head>

<body class="login-page">

    <main class="page-header">

        <div class="page-header-image" aria-hidden="true"></div>

        <section class="content" aria-labelledby="brandName">

            <div class="login-card">

                <div class="logo-container" aria-hidden="true">
                    <span>A</span>
                </div>

                <h1 id="brandName">
                    Ascendra
                </h1>

                <p class="platform">
                    Sales Performance Platform
                </p>

                <form id="loginForm">

                    <div class="input-group">

                        <label class="sr-only" for="userName">
                            Email Address
                        </label>

                        <input
                            type="email"
                            id="userName"
                            name="userName"
                            placeholder="Email Address"
                            autocomplete="email"
                            required>

                    </div>

                    <div class="input-group">

                        <label class="sr-only" for="password">
                            Password
                        </label>

                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Password"
                            autocomplete="current-password"
                            required>

                    </div>

                    <input
                        type="submit"
                        value="Sign In">

                </form>

            </div>

        </section>

        <footer class="footer">

            <p>
                The difference between ordinary and exceptional is the commitment to keep improving.
            </p>

        </footer>

    </main>

    <script src="config.js"></script>
    <script src="login.js"></script>

</body>

</html>
