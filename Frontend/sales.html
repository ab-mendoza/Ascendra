<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascendra - Sales Records</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="sales.css">
</head>

<body>

    <div class="container">

        <aside class="sidebar">

            <div class="logo">
                <h1>Ascendra</h1>
                <p id="welcome-message"></p>
            </div>

            <nav aria-label="Primary navigation">

                <ul>

                    <li>
                        <a href="#">Dashboard</a>
                    </li>

                    <li class="active">
                        <a href="#" aria-current="page">Sales Records</a>
                    </li>

                    <li id="productsMenu">
                        <a href="#">Products</a>
                    </li>

                </ul>

            </nav>

            <button class="logoutButton" type="button">
                Log Out
            </button>

        </aside>

        <main class="content">

            <header>

                <h2>Sales Records</h2>

                <p>
                    Register and manage sales information.
                </p>

            </header>

            <section class="salesPanel" aria-labelledby="salesFormTitle">

                <div class="panelHeader">

                    <h3 id="salesFormTitle">
                        New sales record
                    </h3>

                    <p>
                        Enter the ticket, order, and financial details.
                    </p>

                </div>

                <form action="#" method="post" id="salesForm">

                    <div class="formGrid">

                        <div class="formField">

                            <label for="ticketId">
                                Ticket ID
                            </label>

                            <input
                                type="number"
                                id="ticketId"
                                name="ticketId"
                                inputmode="numeric"
                                placeholder="Enter the Zendesk ticket"
                                required>

                        </div>

                        <div class="formField">

                            <label for="orderId">
                                Order ID
                            </label>

                            <input
                                type="number"
                                id="orderId"
                                name="orderId"
                                min="0"
                                step="0.01"
                                inputmode="decimal"
                                placeholder="Enter the order ID"
                                required>

                        </div>

                        <div class="formField">

                            <label for="initialAmount">
                                Initial Amount
                            </label>

                            <input
                                type="number"
                                id="initialAmount"
                                name="initialAmount"
                                min="0"
                                step="0.01"
                                inputmode="decimal"
                                placeholder="Enter the initial amount"
                                required>

                        </div>

                        <div class="formField">

                            <label for="finalAmount">
                                Final Amount
                            </label>

                            <input
                                type="number"
                                id="finalAmount"
                                name="finalAmount"
                                min="0"
                                step="0.01"
                                inputmode="decimal"
                                placeholder="Enter the final amount"
                                required>

                        </div>

                        <div class="formField formFieldWide">

                            <label for="comment">
                                Comment
                            </label>

                            <textarea
                                id="comment"
                                name="comment"
                                rows="5"
                                placeholder="Write your comment here..."></textarea>

                        </div>

                        <div class="formActions">

                            <button type="submit">
                                Submit Sale
                            </button>

                        </div>

                    </div>

                </form>

            </section>

        </main>

    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>

</body>

</html>
